<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-purple-700 via-blue-500 to-purple-700 text-white min-h-screen flex items-center justify-center">
    <div class="container max-w-4xl p-6 bg-white rounded-2xl shadow-lg text-gray-800">
        <!-- Video Player -->
        <div class="relative mb-6">
            <video class="w-full rounded-lg" controls>
                <source src="sample-video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="absolute top-4 left-4 bg-blue-600 text-white py-1 px-2 rounded">Now Playing</div>
        </div>

        <!-- Episode Selector -->
        <div class="mb-6">
            <h2 class="text-xl font-semibold mb-2">Episode Selector</h2>
            <select class="w-full p-2 border rounded-lg bg-gray-100 text-gray-800">
                <option>Episode 1: The Beginning</option>
                <option>Episode 2: The Adventure Continues</option>
                <option>Episode 3: The Final Showdown</option>
            </select>
        </div>

        <!-- Rating System -->
        <div class="mb-6">
            <h2 class="text-xl font-semibold mb-2">Rate this Episode</h2>
            <div class="flex space-x-2">
                <button class="text-yellow-500 hover:text-yellow-600">★</button>
                <button class="text-yellow-500 hover:text-yellow-600">★</button>
                <button class="text-yellow-500 hover:text-yellow-600">★</button>
                <button class="text-gray-400 hover:text-yellow-600">★</button>
                <button class="text-gray-400 hover:text-yellow-600">★</button>
            </div>
        </div>

        <!-- Comment Section -->
        <div>
            <h2 class="text-xl font-semibold mb-2">Comments</h2>
            <textarea class="w-full p-2 border rounded-lg bg-gray-100 text-gray-800 mb-4" rows="4" placeholder="Write your comment..."></textarea>
            <button class="bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700">Post Comment</button>

            <!-- Display Comments -->
            <div class="mt-6 space-y-4">
                <div class="p-4 bg-gray-100 rounded-lg">
                    <p class="font-semibold">User123</p>
                    <p>Great episode! Really enjoyed it.</p>
                </div>
                <div class="p-4 bg-gray-100 rounded-lg">
                    <p class="font-semibold">MovieFan</p>
                    <p>Can’t wait for the next episode!</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
