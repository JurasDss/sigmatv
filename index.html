<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="background.js" defer></script>
  <script src="buttons.js" defer></script>
  <title>Hub</title>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="container">
    <a href="chinaindex.html" class="button">
      <img src="china-cover.jpg" alt="China Cover" class="button-cover">
      <span class="button-text">China</span>
      <div class="button-glow"></div>
      <svg class="button-circuit" width="100%" height="100%">
        <pattern id="circuit-pattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 0 10 L 20 10 M 10 0 L 10 20" stroke="rgba(255,0,255,0.2)" stroke-width="0.5"/>
        </pattern>
        <rect width="100%" height="100%" fill="url(#circuit-pattern)"/>
      </svg>
    </a>
    <a href="MashleS2/mashleS2index.html" class="button">
      <img src="mashles2-cover.jpg" alt="Mashle Cover" class="button-cover">
      <span class="button-text">Mashle S2</span>
      <div class="button-glow"></div>
      <svg class="button-circuit" width="100%" height="100%">
        <pattern id="circuit-pattern2" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 0 10 L 20 10 M 10 0 L 10 20" stroke="rgba(255,0,255,0.2)" stroke-width="0.5"/>
        </pattern>
        <rect width="100%" height="100%" fill="url(#circuit-pattern2)"/>
      </svg>
    </a>
    <a href="SakamotoDays/Sakamotoindex.html" class="button">
      <img src="sakamoto-cover.jpg" alt="Sakamoto Days Cover" class="button-cover">
      <span class="button-text">SAKAMOTO DAYS</span>
      <div class="button-glow"></div>
      <svg class="button-circuit" width="100%" height="100%">
        <pattern id="circuit-pattern2" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 0 10 L 20 10 M 10 0 L 10 20" stroke="rgba(255,0,255,0.2)" stroke-width="0.5"/>
        </pattern>
        <rect width="100%" height="100%" fill="url(#circuit-pattern2)"/>
      </svg>
    </a>
    <a href="KaijuNo8/Kaijuindex.html" class="button">
      <img src="kaiju-cover.jpg" alt="Kaiju No.8 Cover" class="button-cover">
      <span class="button-text">Kaiju No.8</span>
      <div class="button-glow"></div>
      <svg class="button-circuit" width="100%" height="100%">
        <pattern id="circuit-pattern2" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 0 10 L 20 10 M 10 0 L 10 20" stroke="rgba(255,0,255,0.2)" stroke-width="0.5"/>
        </pattern>
        <rect width="100%" height="100%" fill="url(#circuit-pattern2)"/>
      </svg>
    </a>
    <a href="Evangelion/evangelionindex.html" class="button">
      <img src="evangelion-cover.jpg" alt="Evangelion Cover" class="button-cover">
      <span class="button-text">Evangelion</span>
      <div class="button-glow"></div>
      <svg class="button-circuit" width="100%" height="100%">
        <pattern id="circuit-pattern2" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 0 10 L 20 10 M 10 0 L 10 20" stroke="rgba(255,0,255,0.2)" stroke-width="0.5"/>
        </pattern>
        <rect width="100%" height="100%" fill="url(#circuit-pattern2)"/>
      </svg>
    </a>
  </div>
  <div class="secret-input-container">
    <input type="text" id="secretInput" placeholder="Enter secret code...">
    <button class="submit-button">
      <span class="button-text">Submit</span>
      <div class="button-glow"></div>
      <svg class="button-circuit" width="100%" height="100%">
        <pattern id="circuit-pattern3" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 0 10 L 20 10 M 10 0 L 10 20" stroke="rgba(255,0,255,0.2)" stroke-width="0.5"/>
        </pattern>
        <rect width="100%" height="100%" fill="url(#circuit-pattern3)"/>
      </svg>
    </button>
  </div>
</body>
</html>
