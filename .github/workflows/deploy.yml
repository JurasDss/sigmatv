name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Trigger deployment when changes are pushed to the main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '16'

    - name: Install dependencies (optional, if you use a build tool)
      run: npm install

    - name: Inject Firebase config into HTML
      run: |
        sed -i 's|YOUR_API_KEY|${{ secrets.FIREBASE_API_KEY }}|' index.html
        sed -i 's|YOUR_AUTH_DOMAIN|${{ secrets.FIREBASE_AUTH_DOMAIN }}|' index.html
        sed -i 's|YOUR_PROJECT_ID|${{ secrets.FIREBASE_PROJECT_ID }}|' index.html
        sed -i 's|YOUR_STORAGE_BUCKET|${{ secrets.FIREBASE_STORAGE_BUCKET }}|' index.html
        sed -i 's|YOUR_MESSAGING_SENDER_ID|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|' index.html
        sed -i 's|YOUR_APP_ID|${{ secrets.FIREBASE_APP_ID }}|' index.html

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: gh-pages  # Branch to deploy to
        folder: .  # Folder containing your static files
